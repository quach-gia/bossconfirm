<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="version" content="2026-06-06.2">
    <title>BossConfirm - Quách Gia 郭家 Xác nhận chấm công</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
    --brand:#8B0000;--brand-dark:#6B0000;--brand-light:#a52a2a;
    --bg:#f5f5f5;--white:#ffffff;--card:#ffffff;
    --text:#333333;--text-dim:#777777;--text-dark:#111111;
    --border:#e0e0e0;--border-light:#f0f0f0;
    --success:#2e7d32;--success-bg:#E8F5E9;--success-border:#a5d6a7;
    --warning:#f57f17;--warning-bg:#FFF8E1;--warning-border:#ffe082;
    --danger:#c62828;--danger-bg:#FFEBEE;--danger-border:#ef9a9a;
    --info:#1565c0;--info-bg:#E3F2FD;--info-border:#90caf9;
    --pending-bg:#FAFAFA;--pending-border:#e0e0e0;
    --radius:8px;--radius-lg:16px;
    --shadow:0 2px 8px rgba(0,0,0,.08);
    --shadow-lg:0 4px 16px rgba(0,0,0,.12);
}
html{font-size:16px}
body{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px}
a{color:var(--brand);text-decoration:none}
button{font-family:inherit}

/* ===== LOGIN ===== */
.login-screen{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(135deg,#8B0000 0%,#6B0000 50%,#4a0000 100%)}
.login-card{background:var(--white);border-radius:var(--radius-lg);padding:32px 24px;width:100%;max-width:360px;box-shadow:var(--shadow-lg);text-align:center}
.login-logo{font-size:56px;margin-bottom:8px}
.login-card h1{color:var(--brand);font-size:18px;font-weight:800;margin-bottom:2px;line-height:1.4}
.login-card .login-sub{color:var(--text-dim);font-size:12px;margin-bottom:24px;line-height:1.5}
.login-label{text-align:left;font-size:13px;color:var(--text-dim);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.login-input{width:100%;padding:14px;border:2px solid var(--border);border-radius:var(--radius);font-size:16px;text-align:center;letter-spacing:4px;font-weight:700;margin-bottom:16px;transition:border-color .2s;color:var(--text-dark)}
.login-input:focus{outline:none;border-color:var(--brand)}
.login-input::placeholder{letter-spacing:2px;font-size:14px;color:#bbb}
.btn-login{width:100%;padding:14px;background:var(--brand);color:white;border:none;border-radius:var(--radius);font-size:16px;font-weight:700;cursor:pointer;transition:background .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-login:hover{background:var(--brand-dark)}
.btn-login:active{transform:scale(.98)}
.login-error{color:var(--danger);font-size:13px;margin-top:12px;display:none}

/* ===== HEADER ===== */
.app-header{background:linear-gradient(135deg,var(--brand),var(--brand-dark));color:white;padding:14px 16px;box-shadow:0 2px 12px rgba(0,0,0,.3);position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between}
.header-title{font-size:16px;font-weight:800;display:flex;align-items:center;gap:8px}
.header-actions{display:flex;gap:8px}
.header-btn{background:rgba(255,255,255,.15);border:none;color:white;width:36px;height:36px;border-radius:50%;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.header-btn:hover{background:rgba(255,255,255,.3)}

/* ===== DATE NAV ===== */
.date-nav-bar{display:flex;align-items:center;gap:8px;padding:12px 16px;max-width:480px;margin:0 auto}
.date-btn{width:40px;height:40px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.date-btn:hover{background:var(--brand);color:white;border-color:var(--brand)}
.date-btn:active{transform:scale(.95)}
.date-display{flex:1;text-align:center;font-size:15px;font-weight:700;color:var(--text-dark);background:var(--white);padding:10px;border-radius:var(--radius);border:1px solid var(--border);cursor:pointer}
.date-display input[type=date]{border:none;background:transparent;font:inherit;color:inherit;text-align:center;width:100%;cursor:pointer}
.date-display input[type=date]:focus{outline:none}

/* ===== DEPT TABS ===== */
.dept-tabs{display:flex;gap:6px;padding:0 16px 8px;max-width:480px;margin:0 auto}
.dept-tab{flex:1;padding:10px 6px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-dim);font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:all .2s}
.dept-tab.active{background:var(--brand);border-color:var(--brand);color:white}
.dept-tab:hover:not(.active){background:#f9f0f0;border-color:var(--brand-light)}

/* ===== STATS BAR ===== */
.stats-bar{display:flex;gap:6px;padding:0 16px 10px;max-width:480px;margin:0 auto}
.stat-item{flex:1;padding:8px 6px;background:var(--white);border-radius:var(--radius);text-align:center;border:1px solid var(--border)}
.stat-num{font-size:18px;font-weight:800;color:var(--text-dark)}
.stat-label{font-size:10px;color:var(--text-dim);margin-top:2px}
.stat-item.confirmed .stat-num{color:var(--success)}
.stat-item.pending .stat-num{color:var(--warning)}
.stat-item.missing .stat-num{color:var(--danger)}

/* ===== EMPLOYEE CARDS ===== */
.cards-container{padding:0 16px 120px;max-width:480px;margin:0 auto}

.emp-card{background:var(--card);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;transition:all .3s;box-shadow:var(--shadow);border-left:4px solid transparent}
.emp-card.status-confirmed{border-left-color:var(--success);background:var(--success-bg)}
.emp-card.status-warning{border-left-color:var(--warning);background:var(--warning-bg)}
.emp-card.status-missing{border-left-color:var(--danger);background:var(--danger-bg)}
.emp-card.status-split{border-left-color:var(--info);background:var(--info-bg)}
.emp-card.status-pending{border-left-color:var(--pending-border);background:var(--pending-bg)}
.emp-card.status-off{border-left-color:#757575;background:#EEEEEE;opacity:.85}
.emp-card.status-substitute{border-left-color:#7B1FA2;background:#F3E5F5}
.emp-card.status-drafted{border-left-color:#FF6F00;border-left-width:6px;background:#FFF3E0;box-shadow:0 0 0 2px #FF6F00}
.card-status.st-off{background:#757575;color:white}
.card-status.st-substitute{background:#7B1FA2;color:white}
.card-status.st-drafted{background:#FF6F00;color:white;animation:pulseDraft 1.5s ease-in-out infinite}
@keyframes pulseDraft{0%,100%{opacity:1}50%{opacity:.7}}

.card-header{display:flex;align-items:center;padding:10px 12px;gap:10px}
.card-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;flex-shrink:0}
.card-avatar.dept-bep{background:#e65100}
.card-avatar.dept-phucvu{background:#1565c0}
.card-info{flex:1;min-width:0}
.card-name{font-size:13px;font-weight:700;color:var(--text-dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-name .cn{font-weight:500;color:var(--text-dim);margin-left:4px;font-size:12px}
.card-id{font-size:10px;color:var(--text-dim);margin-top:1px}
.card-status{flex-shrink:0;font-size:11px;font-weight:700;padding:4px 8px;border-radius:12px;white-space:nowrap}
.card-status.st-confirmed{background:var(--success);color:white}
.card-status.st-warning{background:var(--warning);color:white}
.card-status.st-missing{background:var(--danger);color:white}
.card-status.st-split{background:var(--info);color:white}
.card-status.st-pending{background:#e0e0e0;color:#555}

/* Card body: times */
.card-body{padding:0 12px 8px;display:flex;flex-direction:column;gap:4px}
.time-row{display:flex;align-items:center;gap:6px;font-size:12px}
.time-label{font-size:11px;color:var(--text-dim);width:20px;flex-shrink:0;text-align:center}
.time-value{font-weight:700;font-family:'Courier New',monospace;font-size:12px;color:var(--text-dark)}
.time-value.scheduled{color:var(--success)}
.time-value.actual{color:#e65100}
.time-diff{font-size:10px;font-weight:700;padding:1px 5px;border-radius:8px;margin-left:4px}
.time-diff.late{background:#ffebee;color:var(--danger)}
.time-diff.early{background:#e8f5e9;color:var(--success)}

/* Split shift segments */
.split-segment{background:rgba(21,101,192,.06);border:1px solid var(--info-border);border-radius:6px;padding:6px 8px;margin:2px 0}
.split-badge{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:var(--info);color:white;font-size:10px;font-weight:700;margin-right:4px;flex-shrink:0}

/* Card actions */
.card-actions{display:flex;gap:6px;padding:4px 12px 10px;align-items:center}
.btn-xn{padding:6px 12px;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .2s}
.btn-xn:active{transform:scale(.95)}
.btn-xn.confirm{background:var(--success);color:white}
.btn-xn.confirm:hover{background:#1b5e20}
.btn-xn.edit{background:#fff;color:var(--brand);border:1px solid var(--brand)}
.btn-xn.edit:hover{background:var(--brand);color:white}
.btn-xn.edit-link{background:transparent;color:var(--info);border:none;text-decoration:underline;padding:4px 6px;font-size:11px}
.btn-xn.off{background:#fff;color:#757575;border:1px solid #757575}
.btn-xn.off:hover{background:#757575;color:white}
.btn-xn.delete{background:#fff;color:var(--danger);border:1px solid var(--danger);padding:6px 10px}
.btn-xn.delete:hover{background:var(--danger);color:white}

/* Confirm dialog */
.confirm-dialog{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:400;display:none;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(4px)}
.confirm-dialog.show{display:flex}
.confirm-box{background:var(--white);border-radius:var(--radius-lg);padding:24px 20px;width:100%;max-width:340px;text-align:center;animation:scaleIn .25s ease}
.confirm-icon{font-size:48px;color:var(--danger);margin-bottom:12px}
.confirm-title{font-size:16px;font-weight:800;color:var(--text-dark);margin-bottom:6px}
.confirm-msg{font-size:13px;color:var(--text-dim);margin-bottom:18px;line-height:1.5}
.confirm-actions{display:flex;gap:8px}
.confirm-actions button{flex:1;padding:11px;border:none;border-radius:var(--radius);font-size:14px;font-weight:700;cursor:pointer}
.btn-confirm-cancel{background:var(--bg);color:var(--text)}
.btn-confirm-cancel:hover{background:var(--border)}
.btn-confirm-ok{background:var(--danger);color:white}
.btn-confirm-ok:hover{background:#b71c1c}

/* Sync status */
.sync-info{font-size:11px;color:rgba(255,255,255,.85);margin-top:2px;display:flex;align-items:center;gap:4px}
.sync-info a{color:#fff;text-decoration:underline}
.btn-add-emp{padding:10px 14px;background:var(--white);color:#7B1FA2;border:2px dashed #7B1FA2;border-radius:var(--radius);font-size:13px;font-weight:700;cursor:pointer;width:100%;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s}
.btn-add-emp:hover{background:#F3E5F5}
.link-qlnv{display:inline-block;font-size:11px;color:var(--info);text-decoration:underline;margin-top:6px}
.card-spacer{flex:1}

/* ===== BULK CONFIRM ===== */
.bulk-confirm-bar{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);padding:12px 16px;z-index:90;box-shadow:0 -2px 12px rgba(0,0,0,.08)}
.bulk-confirm-inner{max-width:480px;margin:0 auto}
.btn-bulk-confirm{width:100%;padding:14px;background:var(--success);color:white;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
.btn-bulk-confirm:hover{background:#1b5e20}
.btn-bulk-confirm:active{transform:scale(.98)}
.btn-bulk-confirm:disabled{background:#ccc;cursor:not-allowed}
.btn-bulk-confirm .badge{background:rgba(255,255,255,.3);padding:2px 8px;border-radius:10px;font-size:12px;margin-left:4px}

/* ===== EDIT MODAL ===== */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.modal-overlay.show{display:flex}
.modal-sheet{background:var(--white);border-radius:var(--radius-lg) var(--radius-lg) 0 0;width:100%;max-width:480px;max-height:85vh;max-height:85dvh;overflow-y:auto;padding:16px 16px 32px;animation:slideUp .3s ease;padding-top:calc(16px + env(safe-area-inset-top))}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;position:sticky;top:0;background:var(--white);padding:8px 0;z-index:10;border-bottom:1px solid #eee}
.modal-title{font-size:16px;font-weight:800;color:var(--text-dark)}
.modal-subtitle{font-size:12px;color:var(--text-dim);margin-top:2px}
.modal-close{background:#f5f5f5;border:none;color:var(--text-dark);font-size:24px;cursor:pointer;padding:6px 14px;border-radius:50%;min-width:40px;min-height:40px;line-height:1;font-weight:bold}
.modal-close:hover{background:var(--bg)}

.edit-section{margin-bottom:16px;border-radius:var(--radius);padding:12px;border:1px solid var(--border)}
.edit-section.sched{background:#f1f8e9;border-color:var(--success-border)}
.edit-section.actual{background:#fff3e0;border-color:#ffcc80}
.edit-section.confirm-edit{background:var(--white);border-color:var(--brand)}
.edit-section.note-section{background:var(--white)}
.edit-section-label{font-size:12px;font-weight:700;color:var(--text-dim);margin-bottom:8px;display:flex;align-items:center;gap:6px}

.edit-time-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.edit-time-row label{font-size:12px;color:var(--text-dim);width:60px;flex-shrink:0}
.edit-time-row .time-display{font-size:14px;font-weight:700;font-family:'Courier New',monospace;color:var(--text-dark)}

/* Time selectors */
.time-select-group{display:flex;align-items:center;gap:4px}
.time-select{padding:8px 4px;background:var(--bg);border:1px solid var(--border);border-radius:6px;font-size:14px;font-weight:700;font-family:'Courier New',monospace;color:var(--text-dark);cursor:pointer;text-align:center;width:60px;-webkit-appearance:none;appearance:none}
.time-select:focus{outline:none;border-color:var(--brand)}
.time-colon{font-size:16px;font-weight:700;color:var(--text-dim)}

/* Quick input */
.quick-input-row{display:flex;gap:6px;margin-top:8px;align-items:center}
.quick-input{flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:'Courier New',monospace;color:var(--text-dark)}
.quick-input:focus{outline:none;border-color:var(--brand)}
.quick-input::placeholder{font-family:system-ui;color:#bbb;font-size:11px}
.btn-quick{padding:8px 14px;background:var(--brand);color:white;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer}
.btn-quick:hover{background:var(--brand-dark)}

.note-textarea{width:100%;padding:10px;border:1px solid var(--border);border-radius:6px;font-size:13px;resize:none;min-height:60px;font-family:inherit;color:var(--text-dark)}
.note-textarea:focus{outline:none;border-color:var(--brand)}
.note-textarea::placeholder{color:#bbb}

.edit-total-hours{text-align:center;font-size:14px;font-weight:700;color:var(--brand);padding:8px;background:#fff5f5;border-radius:6px;margin-bottom:12px}

.btn-modal-confirm{width:100%;padding:14px;background:var(--success);color:white;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-modal-confirm:hover{background:#1b5e20}

/* Split edit segments */
.split-edit-box{border:2px solid var(--info-border);border-radius:var(--radius);padding:12px;margin-bottom:8px;background:var(--info-bg)}
.split-edit-header{display:flex;align-items:center;gap:6px;margin-bottom:8px;font-size:13px;font-weight:700;color:var(--info)}

/* ===== SUCCESS OVERLAY ===== */
.success-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:300;display:none;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(4px)}
.success-overlay.show{display:flex}
.success-card{background:var(--white);border-radius:var(--radius-lg);padding:32px 24px;width:100%;max-width:360px;text-align:center;animation:scaleIn .3s ease}
@keyframes scaleIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.success-icon{font-size:56px;color:var(--success);margin-bottom:12px}
.success-title{font-size:18px;font-weight:800;color:var(--text-dark);margin-bottom:8px}
.success-detail{font-size:13px;color:var(--text-dim);margin-bottom:20px;line-height:1.6}
.success-actions{display:flex;gap:8px}
.success-actions button{flex:1;padding:12px;border:none;border-radius:var(--radius);font-size:14px;font-weight:700;cursor:pointer}
.btn-success-close{background:var(--success);color:white}
.btn-success-edit{background:var(--white);color:var(--brand);border:1px solid var(--brand) !important}

/* ===== LOADING ===== */
.loading-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:999;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;backdrop-filter:blur(4px)}
.loading-overlay.show{display:flex}
.loading-spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:white;font-size:14px;font-weight:600}

/* ===== TOAST ===== */
.toast-container{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;flex-direction:column;gap:8px;width:calc(100% - 32px);max-width:400px;pointer-events:none}
.toast{padding:12px 16px;border-radius:var(--radius);font-size:13px;font-weight:600;animation:toastIn .3s ease;pointer-events:auto;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow-lg)}
.toast.success{background:var(--success-bg);color:var(--success);border:1px solid var(--success-border)}
.toast.error{background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger-border)}
.toast.info{background:var(--info-bg);color:var(--info);border:1px solid var(--info-border)}
.toast.out{animation:toastOut .3s ease forwards}
@keyframes toastIn{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(-20px)}}

/* ===== EMPTY ===== */
.empty-state{text-align:center;padding:48px 24px;color:var(--text-dim)}
.empty-state i{font-size:48px;margin-bottom:12px;opacity:.4;display:block}
.empty-state p{font-size:14px;line-height:1.6}
</style>
</head>
<body>

<!-- ===== LOGIN SCREEN ===== -->
<div id="loginScreen" class="login-screen">
    <div class="login-card">
        <div class="login-logo">🔥</div>
        <h1>QUÁCH GIA 郭家</h1>
        <div class="login-sub">XÁC NHẬN CHẤM CÔNG<br>確認考勤系統</div>
        <div class="login-label"><i class="fas fa-lock"></i> Mật khẩu 密碼</div>
        <input type="password" id="passwordInput" class="login-input" placeholder="••••••••" autocomplete="off">
        <button class="btn-login" id="btnLogin" onclick="doLogin()" ontouchend="doLogin()"><i class="fas fa-sign-in-alt"></i> Đăng nhập 登入</button>
        <div id="loginError" class="login-error"><i class="fas fa-exclamation-circle"></i> Sai mật khẩu 密碼錯誤</div>
    </div>
</div>

<!-- ===== MAIN APP ===== -->
<div id="mainApp" style="display:none">
    <div class="app-header">
        <div class="header-top">
            <div>
                <div class="header-title"><i class="fas fa-clipboard-check"></i> BossConfirm</div>
                <div class="sync-info" id="syncInfo"><i class="fas fa-database"></i> <span id="syncText">Sẵn sàng</span> · <a href="QuanLyNhanVien.html" target="_blank">Mở QLNV ↗</a> · <span style="font-size:9px;opacity:.6">v2026.06.12.4</span></div>
            </div>

var ROUND_THRESHOLD_MIN = 5; // Nguong tha thu (phut) - boss yeu cau 5p

// Lam tron co chon loc theo quy tac cua Boss:
// VAO ca:
//   - Vao som (truoc lich): tinh = LICH (NV khong duoc tinh som tu phat)
//   - Vao tre <= 5p: tinh = LICH (tha loi tre vat)
//   - Vao tre > 5p: tinh = PUNCH (NV bi tinh dung tre that)
// RA ca:
//   - Ra som (truoc lich): tinh = PUNCH (giu nguyen de boss thay & xu ly - khong duoc phep)
//   - Ra muon <= 5p: tinh = LICH (khong cong tang ca vat)
//   - Ra muon > 5p: tinh = PUNCH (boss xac nhan, NV duoc cong tang ca that)
function roundForBoss(punchTime, schedTime, isStart) {
    if (!punchTime) return schedTime || '';
    if (!schedTime) return normalizeHM(punchTime);
    var p = normalizeHM(punchTime);
    var s = normalizeHM(schedTime);
    var diff = timeDiffMinutes(s, p); // > 0 = punch sau sched, < 0 = punch truoc sched
    if (diff === null) return p;
    if (isStart) {
        // VAO ca
        if (diff <= 0) return s;              // vao som hoac dung gio -> lich
        if (diff <= ROUND_THRESHOLD_MIN) return s; // tre vat -> tha
        return p;                              // tre that -> punch
    } else {
        // RA ca
        if (diff < 0) return p;                // ra som -> giu punch (boss thay & xu ly)
        if (diff <= ROUND_THRESHOLD_MIN) return s; // muon vat -> lich
        return p;                              // muon that -> punch (boss xac nhan)
    }
}

function getInitials(name) {

    return name.substring(0,2).toUpperCase();

function getDeptFromEmp(emp) {

    if (d.indexOf('phục vụ')>=0 || d.indexOf('phuc vu')>=0 || d.indexOf('service')>=0) return 'phucvu';
    return 'bep'; // default
}

function timeDiffMinutes(t1, t2) {
    if (!t1 || !t2) return null;
    var a = t1.split(':'), b = t2.split(':');
    return (parseInt(b[0])*60 + parseInt(b[1])) - (parseInt(a[0])*60 + parseInt(a[1]));
}

function formatMinDiff(mins) {
    if (mins === null || mins === undefined) return '';
    var sign = mins >= 0 ? '+' : '';
    return sign + mins + 'p';
}

function normalizeHM(s) {
    // Normalize any time string to "HH:MM" (pad to 2 digits)
    if (!s) return '';
    s = String(s).trim();
    // Match "H:M", "HH:MM", "HH:MM:SS", "H:MM AM", etc.
    var m = s.match(/(\d{1,2}):(\d{1,2})/);
    if (m) return pad(parseInt(m[1],10)) + ':' + pad(parseInt(m[2],10));
    // Handle pure numeric like "8" → "08:00"
    if (/^\d{1,2}$/.test(s)) return pad(parseInt(s,10)) + ':00';
    return s;
}

function calcHours(start, end) {
    if (!start || !end) return 0;
    var diff = timeDiffMinutes(start, end);
    return diff > 0 ? Math.round(diff / 60 * 10) / 10 : 0;
}

function parseSplitTimes(startStr, endStr) {
    // Handle comma-separated times for split shifts
    var starts = (startStr || '').split(',').map(function(s){ return s.trim(); }).filter(Boolean);
    var ends = (endStr || '').split(',').map(function(s){ return s.trim(); }).filter(Boolean);
    var segments = [];
    var maxLen = Math.max(starts.length, ends.length);
    for (var i = 0; i < maxLen; i++) {
        segments.push({
            start: starts[i] || '',
            end: ends[i] || ''
        });
    }
    return segments;
}

function fetchChamCong(callback) {
    var cbName = '_chamcong_cb_' + (++jsonpCounter);
    var url = 'https://docs.google.com/spreadsheets/d/'+CHAMCONG_SHEET_ID+'/gviz/tq?tqx=out:json;responseHandler:'+cbName+'&sheet='+encodeURIComponent(CHAMCONG_SHEET_NAME);

    // Timeout for JSONP - if no response in 15s, call back with empty
    var _jsonpTimeout = setTimeout(function(){
        if(window[cbName]){
            delete window[cbName];
            console.warn('ChamCong JSONP timeout');
            callback(null, []);
        }
    }, 15000);
    window[cbName] = function(response) {
        clearTimeout(_jsonpTimeout);
        try {
            var rows = [];
            if (response && response.table && response.table.rows) {
                response.table.rows.forEach(function(row) {
                    var cells = row.c || [];

    };

    var script = document.createElement('script');
    script.id = 'jsonp_'+cbName;
    script.src = url;
    script.onerror = function() {
        callback(new Error('JSONP load failed'), []);
        delete window[cbName];
        script.remove();
    };

                    }catch(ex){console.warn('Enrich endDate failed:',ex);}

            }).catch(function(){});

function loadConfirmedForDate(dateStr, callback) {
    // Backend append-only: moi lan XN tao record moi. Can dedup: chi giu LATEST batch per (empId+date).
    // Backend date filter bi loi -> load tat ca + filter client-side.
    apiCall('getConfirmedAttendance', {
        bossPassword: BOSS_PASSWORD
    }).then(function(res) {
        confirmedData = {};
        if (res.success && (res.records || res.data)) {
            var recs = res.records || res.data || [];
            // 1) Filter records cua dateStr
            recs = (Array.isArray(recs) ? recs : []).filter(function(item){
                return parseYMDFromDate(item.date) === dateStr;
            });
            // 2) Sort by confirmedAt desc - record moi nhat dau tien
            recs.sort(function(a,b){
                var ta = new Date(a.confirmedAt || 0).getTime();
                var tb = new Date(b.confirmedAt || 0).getTime();
                return tb - ta;
            });
            // 3) Per empId, chi giu LATEST BATCH. Skip legacy/deleted/cancelled.
            var grouped = {};
            var latestTs = {};
            var latestStatus = {};
            recs.forEach(function(item){
                var k = item.empId;
                var ts = new Date(item.confirmedAt || 0).getTime();

                // Decode status tu note prefix [STATUS:xxx] vi backend bo qua field status
                var rawNote = String(item.note || '');
                var noteStatus = null;
                var cleanNote = rawNote;
                var sm = rawNote.match(/^\[STATUS:(\w+)\]/);
                if (sm) {
                    noteStatus = sm[1];
                    cleanNote = rawNote.substring(sm[0].length);
                }
                var effectiveStatus = noteStatus || item.status || 'confirmed';

                var ci = parseTimeFromDate(item.confirmedIn);
                var co = parseTimeFromDate(item.confirmedOut);

                // BO QUA LEGACY EMPTY RECORDS: tu BossConfirm cu (chua co flatten fix).
                // Dac diem: gio rong + khong co STATUS prefix + khong phai OFF.
                // Treat as garbage -> NV hien lai trang thai pending de boss XN lai.
                if (!noteStatus && !ci && !co) return;

                if (latestTs[k] === undefined) {
                    latestTs[k] = ts;
                    latestStatus[k] = effectiveStatus;
                }
                if (latestStatus[k] === 'deleted' || latestStatus[k] === 'cancelled') return;
                // Bo qua record cu hon batch latest (cach >10s)
                if (latestTs[k] - ts > 10000) return;

                if (!grouped[k]) {
                    grouped[k] = {
                        empId: item.empId,
                        empName: item.empName || '',
                        empNameCN: item.empNameCN || '',
                        date: dateStr,
                        segments: [],
                        status: effectiveStatus,
                        isSubstitute: !!item.isSubstitute,
                        note: cleanNote,
                        confirmedBy: item.confirmedBy || 'boss',
                        confirmedAt: item.confirmedAt || ''
                    };
                }
                var seg = {
                    confirmedStart: ci,
                    confirmedEnd: co,
                    originalStart: parseTimeFromDate(item.originalIn),
                    originalEnd: parseTimeFromDate(item.originalOut),
                    schedStart: parseTimeFromDate(item.schedStart),
                    schedEnd: parseTimeFromDate(item.schedEnd)
                };
                var sIdx = typeof item.shiftIndex === 'number' ? item.shiftIndex : grouped[k].segments.length;
                grouped[k].segments[sIdx] = seg;
            });
            // 4) Loai bo undefined slot trong segments[]
            Object.keys(grouped).forEach(function(k){
                grouped[k].segments = grouped[k].segments.filter(function(s){ return !!s; });
                confirmedData[k] = grouped[k];
            });
        }
        if (callback) callback(null);
    }).catch(function(e) {
        console.warn('Confirmed data failed:', e);
        confirmedData = {};
        if (callback) callback(e);
    });
}

function getScheduleForEmp(empId, dateStr) {

    // Skip entry trong (xoa boi boss qua publishSchedule)
    var result = null;
    allSchedules.forEach(function(s) {
        if (s.empId === empId && s.date === dateStr) {
            // Entry empty = lich da xoa
            if (!s.start && !s.end) return;
            result = s;
        }
    });
    return result;
}

function getChamCongForEmp(empId, dateStr) {
    // dateStr is YYYY-MM-DD, chamcong has DD/MM/YYYY
    var ddmmyyyy = ymdToDDMMYYYY(dateStr);
    var records = [];
    chamCongData.forEach(function(cc) {
        // Normalize the date from chamcong
        var ccDate = (cc.ngay || '').trim();
        var ccMaNV = (cc.maNV || '').trim();
        if (ccMaNV === empId && ccDate === ddmmyyyy) {
            records.push(cc);
        }
    });
    // Sort by time
    records.sort(function(a, b) {
        return (a.gio || '').localeCompare(b.gio || '');
    });
    return records;
}

function buildPunchPairs(records) {
    // Group VÀO CA / TAN CA into pairs
    var pairs = [];
    var currentPair = null;
    records.forEach(function(r) {
        var loai = (r.loai || '').toUpperCase().trim();
        if (loai.indexOf('VÀO') >= 0 || loai.indexOf('VAO') >= 0 || loai === 'VÀO CA') {
            if (currentPair && !currentPair.end) {
                // Previous VÀO CA without TAN CA, save as incomplete
                pairs.push(currentPair);
            }
            currentPair = { start: r.gio || '', end: '', startRecord: r };
        } else if (loai.indexOf('TAN') >= 0 || loai === 'TAN CA') {
            if (currentPair) {
                currentPair.end = r.gio || '';
                currentPair.endRecord = r;
                pairs.push(currentPair);
                currentPair = null;
            } else {
                // TAN CA without VÀO CA
                pairs.push({ start: '', end: r.gio || '', endRecord: r });
            }
        }
    });
    if (currentPair) {
        pairs.push(currentPair);
    }
    return pairs;
}

function matchPunchToSchedule(punchPairs, schedSegments) {
    // Match punch pairs to schedule segments by time proximity
    if (!schedSegments || !schedSegments.length) {
        // No schedule: just return punch pairs as-is
        return punchPairs.map(function(pp, i) {
            return { segIndex: i, schedStart: '', schedEnd: '', punchStart: pp.start, punchEnd: pp.end };
        });
    }

    var matched = [];
    var usedPunches = {};

    schedSegments.forEach(function(seg, si) {
        // Find best matching punch pair
        var bestIdx = -1;
        var bestDist = Infinity;
        punchPairs.forEach(function(pp, pi) {
            if (usedPunches[pi]) return;
            var dist = 0;
            if (seg.start && pp.start) {
                dist += Math.abs(timeDiffMinutes(seg.start, pp.start));
            }
            if (seg.end && pp.end) {
                dist += Math.abs(timeDiffMinutes(seg.end, pp.end));
            }
            if (dist < bestDist) {
                bestDist = dist;
                bestIdx = pi;
            }
        });

        if (bestIdx >= 0) {
            usedPunches[bestIdx] = true;
            matched.push({
                segIndex: si,
                schedStart: seg.start,
                schedEnd: seg.end,
                punchStart: punchPairs[bestIdx].start,
                punchEnd: punchPairs[bestIdx].end
            });
        } else {
            matched.push({
                segIndex: si,
                schedStart: seg.start,
                schedEnd: seg.end,
                punchStart: '',
                punchEnd: ''
            });
        }
    });

    // Any unmatched punches
    punchPairs.forEach(function(pp, pi) {
        if (!usedPunches[pi]) {
            matched.push({
                segIndex: matched.length,
                schedStart: '',
                schedEnd: '',
                punchStart: pp.start,
                punchEnd: pp.end
            });
        }
    });

    return matched;
}

// Phat hien punch nham: thoi gian punch ngan (<2p) va KHONG khop lich
function detectNoiseSegment(seg) {
    if (!seg.punchStart || !seg.punchEnd) return false;
    var dur = timeDiffMinutes(seg.punchStart, seg.punchEnd);
    if (dur === null || dur < 0) return false;
    // Co lich + thoi gian ngan -> co the la nham (vd: ca 4 tieng ma chi cham 30 giay)
    // Khong lich + thoi gian ngan -> chac chan la nham
    if (dur < NOISE_THRESHOLD_MIN) return true;
    return false;
}

// Lay trang thai ignored thuc te (uu tien override cua boss, mac dinh = auto-detect)
function isSegIgnored(empId, segIdx, seg) {
    var key = empId + '_' + segIdx;
    if (noiseOverrides[key] != null) return noiseOverrides[key];
    return !!seg.isNoise;
}

function buildEmployeeCardData(emp, dateStr) {
    var sched = getScheduleForEmp(emp.empId, dateStr);
    var ccRecords = getChamCongForEmp(emp.empId, dateStr);
    var punchPairs = buildPunchPairs(ccRecords);
    var confirmed = confirmedData[emp.empId] || null;

    var schedSegments = [];
    if (sched) {
        schedSegments = parseSplitTimes(sched.start, sched.end);
    }

    var isSplit = schedSegments.length > 1 || punchPairs.length > 1 || (confirmed && confirmed.segments && confirmed.segments.length > 1);
    var matchedSegments = matchPunchToSchedule(punchPairs, schedSegments);
    // Extend matchedSegments to cover confirmed segments (multi-ca Boss tự thêm)
    if (confirmed && confirmed.segments && confirmed.segments.length > matchedSegments.length) {
        for (var _ei = matchedSegments.length; _ei < confirmed.segments.length; _ei++) {
            matchedSegments.push({schedStart:'', schedEnd:'', punchStart:'', punchEnd:''});
        }
    }

    // Danh dau cac segment co the la punch nham
    matchedSegments.forEach(function(seg) {
        // Chi flag nhung segment KHONG co lich (orphan punch) va thoi gian ngan
        if (!seg.schedStart && detectNoiseSegment(seg)) {
            seg.isNoise = true;
        }
    });

    // Determine status
    var status = 'pending'; // default
    var draft = null; // Bo draft mode - click XN save ngay
    if (confirmed) {
        if (confirmed.status === 'off') status = 'off';
        else if (confirmed.status === 'substitute' || confirmed.isSubstitute) status = 'substitute';
        else status = 'confirmed';
    } else {
        // Check if any segment has missing punch
        var hasMissing = false;
        var hasTimeDiff = false;

        if (matchedSegments.length === 0 && schedSegments.length > 0) {
            hasMissing = true;
        }

        matchedSegments.forEach(function(seg) {
            if (seg.schedStart && (!seg.punchStart || !seg.punchEnd)) {
                hasMissing = true;
            }
            if (seg.schedStart && seg.punchStart) {
                var diff = timeDiffMinutes(seg.schedStart, seg.punchStart);
                if (diff !== null && Math.abs(diff) > 0) hasTimeDiff = true;
            }
            if (seg.schedEnd && seg.punchEnd) {
                var diff = timeDiffMinutes(seg.schedEnd, seg.punchEnd);
                if (diff !== null && Math.abs(diff) > 0) hasTimeDiff = true;
            }
        });

        if (hasMissing) status = 'missing';
        else if (isSplit) status = 'split';
        else if (hasTimeDiff) status = 'warning';
        else if (punchPairs.length > 0) status = 'pending';
    }

    return {
        emp: emp,
        sched: sched,
        schedSegments: schedSegments,
        punchPairs: punchPairs,
        matchedSegments: matchedSegments,
        confirmed: confirmed,
        draft: draft,
        isSplit: isSplit,
        status: status
    };
}

function getConfirmedForEmp(empId) {
    if (!confirmedData || typeof confirmedData !== 'object') return null;
    return confirmedData[empId] || null;
}

function renderCards() {
    _extraSegsCount = 0; // Reset Boss added segs when re-render
    var container = $id('cardsContainer');
    if (!currentDate) return;

    // Get employees for current department
    var cards = [];
    allEmployees.forEach(function(emp) {
        // Filter: Boss đã ẩn entry này
        if (hiddenEntries[emp.empId+'_'+currentDate]) return;
        // Cross-dept: include if Boss added as substitute to current dept
        var inCurrentDept = getDeptFromEmp(emp) === currentDept;
        var isSubAdded = subAddedDept[emp.empId+'_'+currentDate] === currentDept;
        if (!inCurrentDept && !isSubAdded) return;
        var sched = getScheduleForEmp(emp.empId, currentDate);
        var ccRecords = getChamCongForEmp(emp.empId, currentDate);
        // Hiện NV có lịch, có chấm công, hoặc đã được boss xác nhận/thêm thay ca/OFF
        var hasConfirmed = !!confirmedData[emp.empId];
        if (!sched && ccRecords.length === 0 && !hasConfirmed) return;
        cards.push(buildEmployeeCardData(emp, currentDate));
    });

    // Sort: pending/missing dau, confirmed cuoi
    var statusOrder = {missing:0, warning:1, split:2, pending:3, substitute:4, confirmed:5, off:6};
    cards.sort(function(a, b) {
        return (statusOrder[a.status]||3) - (statusOrder[b.status]||3);
    });

    // Update stats
    var countConfirmed = 0, countPending = 0, countMissing = 0;
    cards.forEach(function(c) {
        if (c.status === 'confirmed' || c.status === 'off' || c.status === 'substitute') countConfirmed++;
        else if (c.status === 'missing') countMissing++;
        else countPending++;
    });
    $id('statConfirmed').textContent = countConfirmed;
    $id('statPending').textContent = countPending;
    $id('statMissing').textContent = countMissing;

    // Bo bulk button - workflow moi: XN ca nhan = save ngay
    $id('bulkBar').style.display = 'none';

    if (cards.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-calendar-times"></i><p>Không có nhân viên nào có lịch ngày này<br>今天沒有員工排班</p></div>';
        return;
    }

    var html = '';
    cards.forEach(function(card) {
        html += renderSingleCard(card);
    });

    // Nút thêm NV thay ca
    html += '<button class="btn-add-emp" id="btnAddSub"><i class="fas fa-user-plus"></i> Thêm nhân viên thay ca 添加代班員工</button>';

    container.innerHTML = html;

    // Bind card action buttons
    bindCardActions();

    // Bind add substitute button
    var btnAdd = $id('btnAddSub');
    if (btnAdd) btnAdd.addEventListener('click', openAddSubModal);
}

        h += '<button class="btn-xn off" data-action="off" data-empid="'+emp.empId+'"><i class="fas fa-user-slash"></i> OFF</button>';

        h += '<button class="btn-xn edit" data-action="edit" data-empid="'+emp.empId+'"><i class="fas fa-edit"></i> Sửa 修改</button>';
    }
    h += '</div>';

    h += '</div>';
    return h;
}

function escHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function bindCardActions() {
    document.querySelectorAll('.btn-xn[data-action]').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            var action = this.dataset.action;
            var empId = this.dataset.empid;
            if (action === 'quick-confirm') {
                doQuickConfirm(empId);
            } else if (action === 'edit') {
                openEditModal(empId);
            } else if (action === 'off') {
                doOffConfirm(empId);
            } else if (action === 'unoff') {
                doUnoff(empId);
            } else if (action === 'delete') {
                askDeleteConfirmation(empId);
            }
        });
    });
    // Toggle bỏ/khôi phục segment (punch nhầm)
    document.querySelectorAll('.seg-toggle').forEach(function(btn){
        btn.addEventListener('click', function(e){
            e.stopPropagation();
            var empId = this.dataset.empid;
            var idx = parseInt(this.dataset.idx, 10);
            var key = empId + '_' + idx;
            var action = this.dataset.action;
            noiseOverrides[key] = (action === 'restore'); // restore=true=keep, ignore=false
            renderCards();
        });
    });
}

function showConfirmDialog(title, msg, onOk) {

function addSubstitute(empId) {
    var emp = findEmp(empId);
    if (!emp) return;
    // Mark dept assignment for cross-dept tracking
    subAddedDept[empId+'_'+currentDate] = currentDept;
    try { localStorage.setItem('bc2_subDept', JSON.stringify(subAddedDept)); } catch(ex){}
    // Clear hidden flag if exists
    if (hiddenEntries[empId+'_'+currentDate]) {
        delete hiddenEntries[empId+'_'+currentDate];
        try { localStorage.setItem('bc2_hidden', JSON.stringify(hiddenEntries)); } catch(ex){}
    }

    // Lấy chấm công của NV này (nếu có)
    var ccRecords = getChamCongForEmp(empId, currentDate);
    var punchPairs = buildPunchPairs(ccRecords);

    var segments = [];
    if (punchPairs.length > 0) {
        punchPairs.forEach(function(pp) {
            segments.push({
                confirmedStart: pp.start || '',
                confirmedEnd: pp.end || '',
                originalStart: pp.start || '',
                originalEnd: pp.end || '',
                schedStart: '',
                schedEnd: ''
            });
        });
    } else {
        // Không có chấm công → cho phép nhập tay sau qua Sửa
        segments.push({
            confirmedStart: '',
            confirmedEnd: '',
            originalStart: '',
            originalEnd: '',
            schedStart: '',
            schedEnd: ''
        });
    }

    var data = {
        empId: empId,
        empName: emp.name,
        empNameCN: emp.nameCN || '',
        date: currentDate,
        segments: segments,
        status: 'substitute',
        isSubstitute: true,
        note: 'Thay ca 代班',
        confirmedAt: new Date().toISOString(),
        confirmedBy: 'boss'
    };

    saveConfirmation(data);
}

// ========== QUICK CONFIRM (save backend NGAY) ==========
function doQuickConfirm(empId) {
    var card = buildEmployeeCardData(findEmp(empId), currentDate);
    if (!card) return;

    // Build confirmed segments, BỎ QUA segment punch nham + LAM TRON gio ve lich neu lech nho
    var segments = [];
    var skippedNoise = 0;
    var rounded = 0;
    card.matchedSegments.forEach(function(seg, idx) {
        if (isSegIgnored(empId, idx, seg)) {
            skippedNoise++;
            return;
        }
        // Lam tron theo quy tac Boss: vao tre 5p tha, ra som giu nguyen, ra muon 5p tha, >5p giu nguyen
        var cStart = seg.punchStart || seg.schedStart || '';
        var cEnd = seg.punchEnd || seg.schedEnd || '';
        if (seg.schedStart && seg.punchStart) {
            var sRounded = roundForBoss(seg.punchStart, seg.schedStart, true);
            if (sRounded !== normalizeHM(seg.punchStart)) rounded++;
            cStart = sRounded;
        }
        if (seg.schedEnd && seg.punchEnd) {
            var eRounded = roundForBoss(seg.punchEnd, seg.schedEnd, false);
            if (eRounded !== normalizeHM(seg.punchEnd)) rounded++;
            cEnd = eRounded;
        }
        segments.push({
            confirmedStart: cStart,
            confirmedEnd: cEnd,
            originalStart: seg.punchStart || '',
            originalEnd: seg.punchEnd || '',
            schedStart: seg.schedStart || '',
            schedEnd: seg.schedEnd || ''
        });
    });

    var noteParts = [];
    if (skippedNoise > 0) noteParts.push('Đã bỏ '+skippedNoise+' lần punch nhầm');
    if (rounded > 0) noteParts.push('Tự làm tròn '+rounded+' giờ về lịch');
    var note = noteParts.join('; ');

    var data = {
        empId: empId,
        empName: card.emp.name,
        empNameCN: card.emp.nameCN || '',
        date: currentDate,
        segments: segments,
        note: note,
        confirmedAt: new Date().toISOString(),
        confirmedBy: 'boss'
    };

    // SAVE NGAY len backend (khong qua draft)
    saveConfirmation(data);
}

function findEmp(empId) {
    var found = null;
    allEmployees.forEach(function(e){ if (e.empId === empId) found = e; });
    return found;
}

window.openEditModal = function(empId) {
    var emp = findEmp(empId);
    if (!emp) return;

    var card = buildEmployeeCardData(emp, currentDate);
    var existing = card.confirmed;

    var html = '';
    html += '<div class="modal-header">';
    html += '<div>';
    html += '<div class="modal-title">'+escHtml(emp.name)+(emp.nameCN ? ' '+escHtml(emp.nameCN) : '')+'</div>';
    html += '<div class="modal-subtitle">'+formatDateVN(currentDate)+' | '+escHtml(emp.empId)+'</div>';
    html += '</div>';
    html += '<button class="modal-close" id="btnCloseEdit">&times;</button>';
    html += '</div>';

    // Loc segment bi danh dau bo qua (punch nham) - chi edit segment hop le
    var validSegments = card.matchedSegments.filter(function(seg, idx){
        return !isSegIgnored(empId, idx, seg);
    });
    if (validSegments.length === 0) validSegments = [{schedStart:'', schedEnd:'', punchStart:'', punchEnd:''}];

    var ignoredCount = card.matchedSegments.length - validSegments.length;
    if (ignoredCount > 0) {
        html += '<div style="background:#FFF3E0;border:1px solid #FFCC80;border-radius:6px;padding:8px 10px;margin-bottom:12px;font-size:12px;color:#E65100">';

    }

    // For each segment
    var numSegs = Math.max(validSegments.length, 1);

    // Boss added extra segments
    numSegs = numSegs + _extraSegsCount;
    for (var si = 0; si < numSegs; si++) {
        var seg = validSegments[si] || {schedStart:'', schedEnd:'', punchStart:'', punchEnd:''};
        var existSeg = (existing && existing.segments && existing.segments[si]) || null;

        var confirmStart = normalizeHM(existSeg ? (existSeg.confirmedStart || '') : (seg.punchStart || seg.schedStart || ''));

    if (_extraSegsCount > 0) {
        html += '<button type="button" onclick="window._removeExtraSegment(\''+empId+'\');" style="width:100%;padding:6px;margin-bottom:12px;background:#fff;color:#c62828;border:1px solid #c62828;border-radius:4px;font-size:11px;cursor:pointer"><i class="fas fa-minus"></i> Bỏ ca cuối 移除最後班次</button>';
    }

    // Note
    var existNote = (existing && existing.note) || '';
    html += '<div class="edit-section note-section">';
    html += '<div class="edit-section-label"><i class="fas fa-sticky-note"></i> Ghi chú 備註</div>';
    html += '<textarea class="note-textarea" id="editNote" placeholder="Ghi chú thêm... 備註...">'+escHtml(existNote)+'</textarea>';
    html += '</div>';

    // Total hours
    html += '<div class="edit-total-hours" id="editTotalHours">Tổng giờ 總時數: --</div>';

    // Confirm button
    html += '<button class="btn-modal-confirm" id="btnModalConfirm" data-empid="'+empId+'" data-segments="'+numSegs+'">';
    html += '<i class="fas fa-check"></i> Xác nhận 確認';
    html += '</button>';

    $id('editSheet').innerHTML = html;
    $id('editModal').classList.add('show');

    // Bind close
    $id('btnCloseEdit').addEventListener('click', closeEditModal);
    $id('editModal').addEventListener('click', function(e){
        if (e.target === $id('editModal')) closeEditModal();
    });

    // Bind confirm
    $id('btnModalConfirm').addEventListener('click', function(){
        doEditConfirm(empId, numSegs);
    });

    // Calculate total
    updateEditTotal(numSegs);

    // Bind selects to update total
    for (var j = 0; j < numSegs; j++) {
        (function(idx){
            ['editStartH_'+idx, 'editStartM_'+idx, 'editEndH_'+idx, 'editEndM_'+idx].forEach(function(id){
                var el = $id(id);
                if (el) el.addEventListener('change', function(){ updateEditTotal(numSegs); });
            });
        })(j);
    }
}



// Confirm popup before delete
window._askDelSegment = function(empId, segIdx){
    showConfirmDialog(
        'Xóa Ca '+(segIdx+1)+'?',
        'Bạn có chắc chắn muốn xóa <b>Ca '+(segIdx+1)+'</b>?<br><br><span style="color:var(--danger);font-size:11px">⚠ Toàn bộ ca sau sẽ được lưu ngay lên backend</span>',
        function(){ window._delSegment(empId, segIdx); }
    );
};
// Actually delete + auto-save backend
window._delSegment = function(empId, segIdx){
    var card = buildEmployeeCardData(findEmp(empId), currentDate);
    var allSegs = card.matchedSegments;
    var validSegs = allSegs.filter(function(s,i){return !isSegIgnored(empId, i, s);});
    if (validSegs.length === 0) validSegs = [{}];
    if (segIdx >= validSegs.length) {
        if (_extraSegsCount > 0) _extraSegsCount--;
    } else {
        var validToAll = [];
        allSegs.forEach(function(s,i){if(!isSegIgnored(empId,i,s))validToAll.push(i);});
        var origIdx = validToAll[segIdx];
        if (origIdx != null) {
            noiseOverrides[empId + '_' + origIdx] = true;
        }
    }
    // Collect REMAINING segments from current modal inputs (other ca, không phải ca bị xóa)
    var btnConfirm = document.getElementById('btnModalConfirm');
    var currentNumSegs = btnConfirm ? parseInt(btnConfirm.dataset.segments) : 1;
    var remainSegs = [];
    for (var i = 0; i < currentNumSegs; i++) {
        if (i === segIdx) continue; // skip the one being deleted
        var sh = (document.getElementById('editStartH_'+i)||{}).value || '';
        var sm = (document.getElementById('editStartM_'+i)||{}).value || '';
        var eh = (document.getElementById('editEndH_'+i)||{}).value || '';
        var em = (document.getElementById('editEndM_'+i)||{}).value || '';
        var cs = (sh && sm) ? sh+':'+sm : '';
        var ce = (eh && em) ? eh+':'+em : '';
        remainSegs.push({
            confirmedStart: cs,
            confirmedEnd: ce,
            originalStart: (allSegs[i]||{}).punchStart || '',
            originalEnd: (allSegs[i]||{}).punchEnd || '',
            schedStart: (allSegs[i]||{}).schedStart || '',
            schedEnd: (allSegs[i]||{}).schedEnd || ''
        });
    }
    var emp = findEmp(empId);
    var existingNote = (confirmedData[empId] && confirmedData[empId].note) || '';
    var hasNonEmpty = remainSegs.some(function(s){return s.confirmedStart || s.confirmedEnd;});
    if (hasNonEmpty) {
        // Save remaining segments to backend
        var data = {
            empId: empId, empName: emp.name, empNameCN: emp.nameCN||'',
            date: currentDate,
            segments: remainSegs,
            note: existingNote,
            confirmedAt: new Date().toISOString(),
            confirmedBy: 'boss'
        };
        closeEditModal();
        saveConfirmation(data);
    } else {
        // No segments left → call delete confirmation (status=deleted)
        closeEditModal();
        doDeleteConfirmation(empId);
    }
};

window._addExtraSegment = function(empId){ _extraSegsCount++; window.openEditModal(empId); };
window._removeExtraSegment = function(empId){ if(_extraSegsCount>0)_extraSegsCount--; window.openEditModal(empId); };

function buildHourSelect(id, selected) {
    var h = '<select class="time-select" id="'+id+'">';
    h += '<option value="">--</option>';
    for (var i = 0; i <= 23; i++) {
        var v = pad(i);
        h += '<option value="'+v+'"'+(v===selected?' selected':'')+'>'+v+'</option>';
    }
    h += '</select>';
    return h;
}

function buildMinuteSelect(id, selected) {
    var h = '<select class="time-select" id="'+id+'">';
    h += '<option value="">--</option>';
    for (var i = 0; i < 60; i++) {
        var v = pad(i);
        h += '<option value="'+v+'"'+(v===selected?' selected':'')+'>'+v+'</option>';
    }
    h += '</select>';
    return h;
}

window.applyQuickInput = function(segIdx) {
    var input = $id('quickInput_'+segIdx);
    if (!input) return;
    var val = input.value.trim();
    if (!val) return;

    // Parse formats: "17-23", "17:00-23:00", "9-22", "09:30-22:00"
    var parts = val.split(/[-–]/);
    if (parts.length !== 2) { toast('Sai định dạng. VD: 09-22', 'error'); return; }

    function parseTime(s) {
        s = s.trim();
        if (s.indexOf(':') >= 0) {
            var p = s.split(':');
            return { h: pad(parseInt(p[0])), m: pad(parseInt(p[1]) || 0) };
        } else {
            return { h: pad(parseInt(s)), m: '00' };
        }
    }

    var t1 = parseTime(parts[0]);
    var t2 = parseTime(parts[1]);

    var sh = $id('editStartH_'+segIdx);
    var sm = $id('editStartM_'+segIdx);
    var eh = $id('editEndH_'+segIdx);
    var em = $id('editEndM_'+segIdx);

    if (sh) sh.value = t1.h;
    if (sm) sm.value = t1.m;
    if (eh) eh.value = t2.h;
    if (em) em.value = t2.m;

    input.value = '';
    toast('Đã áp dụng: '+t1.h+':'+t1.m+' - '+t2.h+':'+t2.m, 'success');

    // Update total
    var numSegs = parseInt($id('btnModalConfirm').dataset.segments) || 1;
    updateEditTotal(numSegs);
};

function updateEditTotal(numSegs) {
    var totalHours = 0;
    for (var i = 0; i < numSegs; i++) {
        var sh = ($id('editStartH_'+i)||{}).value || '';
        var sm = ($id('editStartM_'+i)||{}).value || '';
        var eh = ($id('editEndH_'+i)||{}).value || '';
        var em2 = ($id('editEndM_'+i)||{}).value || '';
        if (sh && sm && eh && em2) {
            var start = sh+':'+sm;
            var end = eh+':'+em2;
            totalHours += calcHours(start, end);
        }
    }
    var el = $id('editTotalHours');
    if (el) el.textContent = 'Tổng giờ 總時數: ' + totalHours.toFixed(1) + 'h';
}

function closeEditModal() {
    $id('editModal').classList.remove('show');
}

function doEditConfirm(empId, numSegs) {
    var emp = findEmp(empId);
    if (!emp) return;

    var card = buildEmployeeCardData(emp, currentDate);
    // Filter ra cac segment hop le (giong logic openEditModal)
    var validSegments = card.matchedSegments.filter(function(seg, idx){
        return !isSegIgnored(empId, idx, seg);
    });
    if (validSegments.length === 0) validSegments = [{schedStart:'', schedEnd:'', punchStart:'', punchEnd:''}];

    var segments = [];

    for (var i = 0; i < numSegs; i++) {
        var sh = ($id('editStartH_'+i)||{}).value || '';
        var sm = ($id('editStartM_'+i)||{}).value || '';
        var eh = ($id('editEndH_'+i)||{}).value || '';
        var em2 = ($id('editEndM_'+i)||{}).value || '';

        var confirmedStart = (sh && sm) ? sh+':'+sm : '';
        var confirmedEnd = (eh && em2) ? eh+':'+em2 : '';

        var origSeg = validSegments[i] || {};

        segments.push({
            confirmedStart: confirmedStart,
            confirmedEnd: confirmedEnd,
            originalStart: origSeg.punchStart || '',
            originalEnd: origSeg.punchEnd || '',
            schedStart: origSeg.schedStart || '',
            schedEnd: origSeg.schedEnd || ''
        });
    }

    var note = ($id('editNote') || {}).value || '';

    var data = {
        empId: empId,
        empName: emp.name,
        empNameCN: emp.nameCN || '',
        date: currentDate,
        segments: segments,
        note: note,
        confirmedAt: new Date().toISOString(),
        confirmedBy: 'boss'
    };

    closeEditModal();
    // Save NGAY len backend
    saveConfirmation(data);
}

// ========== BACKEND ADAPTER ==========
// Backend Apps Script doc field theo top-level (confirmedIn/Out, shiftIndex).
// IMPORTANT: Backend IGNORE truong `status` (luon luu = "confirmed"). Workaround: encode
// status vao prefix cua note field: "[STATUS:off]reason..." de persist qua API.
function flattenForBackend(data) {
    var records = [];
    var segs = data.segments || [];
    var statusTag = data.status || 'confirmed';
    var rawNote = data.note || '';
    // Encode status vao note (workaround backend strip status field)
    var encodedNote = '[STATUS:'+statusTag+']' + rawNote;
    var base = {
        empId: data.empId,
        empName: data.empName || '',
        empNameCN: data.empNameCN || '',
        date: data.date,
        note: encodedNote,
        status: statusTag, // van gui phong khi backend update
        isSubstitute: data.isSubstitute || false,
        confirmedBy: data.confirmedBy || 'boss',
        confirmedAt: data.confirmedAt || new Date().toISOString()
    };
    if (segs.length === 0) {
        var r = Object.assign({}, base, {
            shiftIndex: 0,
            confirmedIn: '', confirmedOut: '',
            originalIn: '', originalOut: '',
            schedStart: '', schedEnd: ''
        });
        records.push(r);
    } else {
        segs.forEach(function(s, idx) {
            var r = Object.assign({}, base, {
                shiftIndex: idx,
                confirmedIn: s.confirmedStart || '',
                confirmedOut: s.confirmedEnd || '',
                originalIn: s.originalStart || '',
                originalOut: s.originalEnd || '',
                schedStart: s.schedStart || '',
                schedEnd: s.schedEnd || ''
            });
            records.push(r);
        });
    }
    return records;
}

// Parse time tu Date string (vd "Sat Dec 30 1899 09:00:00 GMT+0706" -> "09:00")
function parseTimeFromDate(s) {
    if (!s) return '';
    s = String(s).trim();
    var m = s.match(/^(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?/);
    if (m) return pad(parseInt(m[1],10)) + ':' + pad(parseInt(m[2],10));
    m = s.match(/\b(\d{2}):(\d{2}):(\d{2})\b/);
    if (m) return pad(parseInt(m[1],10)) + ':' + pad(parseInt(m[2],10));
    return '';
}

// Parse date string -> YYYY-MM-DD
function parseYMDFromDate(s) {
    if (!s) return '';
    s = String(s).trim();
    if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.substring(0,10);
    var d = new Date(s);
    if (!isNaN(d.getTime())) {
        return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
    }
    return '';
}

// ========== SYNC STATUS ==========
function updateSyncStatus(success) {
    var el = $id('syncText');
    if (!el) return;
    var now = vnNow();
    var hh = pad(now.getHours()), mm = pad(now.getMinutes());
    if (success) {
        el.innerHTML = '✓ Đã đồng bộ QLNV lúc '+hh+':'+mm;
        el.style.color = '#90EE90';
    } else {
        el.innerHTML = '⚠ Offline - sẽ đồng bộ sau';
        el.style.color = '#FFD54F';
    }
}

// ========== SAVE CONFIRMATION ==========
function saveConfirmation(data) {
    showLoading('Đang lưu xác nhận 正在保存...');

    // Backend nhan array record da flatten (1 record / 1 segment)
    var inputArr = Array.isArray(data) ? data : [data];
    var payload = [];
    inputArr.forEach(function(d){ payload = payload.concat(flattenForBackend(d)); });

    apiCall('confirmAttendance', {
        bossPassword: BOSS_PASSWORD,
        data: JSON.stringify(payload)
    }).then(function(res) {
        hideLoading();
        if (res.success) {
            // Update local state
            confirmedData[data.empId] = data;
            renderCards();
            updateSyncStatus(true);
            toast('✓ Đã lưu & đồng bộ QLNV: '+data.empName, 'success');
        } else {
            updateSyncStatus(false);
            toast('Lỗi: '+(res.error||'Không rõ')+ ' 錯誤', 'error');
        }
    }).catch(function(e) {
        hideLoading();
        console.error('Save failed:', e);
        // Save locally as fallback
        confirmedData[data.empId] = data;
        try {
            var local = JSON.parse(localStorage.getItem('bc2_pending_confirms') || '[]');
            local.push(data);
            localStorage.setItem('bc2_pending_confirms', JSON.stringify(local));
        } catch(ex){}
        renderCards();
        updateSyncStatus(false);
        toast('Lưu offline, sẽ đồng bộ sau 離線保存', 'info');
    });
}

// ========== BULK CONFIRM (commit all drafts) ==========
$id('btnBulkConfirm').addEventListener('click', function(){
    if (isLoading) return;

    // Chi commit nhung NV trong DRAFT (Boss da explicitly click XN/Sua)
    var toConfirm = Object.values(draftConfirmations);

    if (toConfirm.length === 0) {
        toast('⚠ Chưa chọn NV nào! Hãy bấm "XN" hoặc "Sửa" trên từng card trước.', 'info');
        return;
    }

    showLoading('Đang xác nhận '+toConfirm.length+' nhân viên...');

    // Send bulk - flatten tat ca segments
    var bulkPayload = [];
    toConfirm.forEach(function(d){ bulkPayload = bulkPayload.concat(flattenForBackend(d)); });
    apiCall('confirmAttendance', {
        bossPassword: BOSS_PASSWORD,
        data: JSON.stringify(bulkPayload)
    }).then(function(res) {
        hideLoading();
        if (res.success) {
            // Move tu draft -> confirmedData (da commit)
            toConfirm.forEach(function(d) {
                confirmedData[d.empId] = d;
                delete draftConfirmations[d.empId];
            });
            renderCards();
            updateSyncStatus(true);
            showSuccessOverlay(toConfirm.length, 0);
        } else {
            updateSyncStatus(false);
            toast('Lỗi: '+(res.error||'Không rõ'), 'error');
        }
    }).catch(function(e) {
        hideLoading();
        // Save locally (giu draft + queue offline)
        try {
            var local = JSON.parse(localStorage.getItem('bc2_pending_confirms') || '[]');
            toConfirm.forEach(function(d){ local.push(d); });
            localStorage.setItem('bc2_pending_confirms', JSON.stringify(local));
        } catch(ex){}
        toConfirm.forEach(function(d) {
            confirmedData[d.empId] = d;
            delete draftConfirmations[d.empId];
        });
        renderCards();
        updateSyncStatus(false);
        showSuccessOverlay(toConfirm.length, 0, true);
    });
});

// ========== SUCCESS OVERLAY ==========

    $id('successDetail').innerHTML =
        '<strong>'+confirmed+'</strong> nhân viên đã được xác nhận 員工已確認' +
        (edited > 0 ? '<br><strong>'+edited+'</strong> đã chỉnh sửa 已修改' : '') +
        (isOffline
            ? '<br><span style="color:var(--warning)">⚠ Lưu offline, sẽ đồng bộ QLNV khi có mạng</span>'
            : '<br><span style="color:var(--success);font-size:12px"><i class="fas fa-database"></i> Đã đồng bộ với hệ thống QLNV</span>') +
        '<br><span style="font-size:11px;color:var(--text-dim)">'+formatDateVN(currentDate)+'</span>' +
        '<br><a href="QuanLyNhanVien.html" target="_blank" style="font-size:11px;color:var(--info);text-decoration:underline"><i class="fas fa-external-link-alt"></i> Mở QLNV để kiểm tra dữ liệu</a>';
    $id('successOverlay').classList.add('show');
}

});

$id('btnSuccessEdit').addEventListener('click', function(){
    $id('successOverlay').classList.remove('show');
    // User wants to edit — they can click edit on individual cards
});

// ========== RETRY PENDING ==========
function retryPendingConfirms() {
    try {
        var pending = JSON.parse(localStorage.getItem('bc2_pending_confirms') || '[]');
        if (pending.length === 0) return;

        var flat = [];
        pending.forEach(function(d){ flat = flat.concat(flattenForBackend(d)); });
        apiCall('confirmAttendance', {
            bossPassword: BOSS_PASSWORD,
            data: JSON.stringify(flat)
        }).then(function(res) {
            if (res.success) {
                localStorage.removeItem('bc2_pending_confirms');
                toast('Đã đồng bộ '+pending.length+' xác nhận offline 已同步', 'success');
            }
        }).catch(function(){});
    } catch(e) {}
}

// ========== INIT ==========
checkAuth();

// Retry pending on load
setTimeout(retryPendingConfirms, 5000);

})();
